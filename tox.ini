[tox]
requires =
    tox>=4
env_list = lint, format, typecheck
skip_missing_interpreters = true

[testenv:lint]
description = Lint using flake8
skip_install = true
deps =
    flake8
commands =
    flake8 scripts

[testenv:format]
description = Check formatting using black, isort, autoflake
skip_install = true
deps =
    black
    isort
    autoflake
commands =
    black --check scripts
    isort --check-only scripts
    autoflake --check --recursive scripts

[testenv:typecheck]
description = Type-check using mypy
skip_install = true
deps =
    mypy
    pydantic[mypy]
    click[mypy]
    types-PyYAML
    pandas-stubs

commands =
    mypy --config-file pyproject.toml scripts